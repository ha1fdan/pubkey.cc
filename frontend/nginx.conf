server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: routes like /u/<key> aren't real files, so serve
    # index.html and let the client-side router in src/router.js handle it.
    location / {
        try_files $uri /index.html;
    }
}
