server {
    # >1024 so the master process doesn't need root/CAP_NET_BIND_SERVICE to
    # bind it -- required for running the container as a non-root user.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: routes like /u/<key> aren't real files, so serve
    # index.html and let the client-side router in src/router.js handle it.
    location / {
        try_files $uri /index.html;
    }
}
