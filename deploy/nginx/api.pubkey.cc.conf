# Reference copy of the reverse proxy config for api.pubkey.cc (the
# backend). Lives on the deploy host at /etc/nginx/sites-enabled/api.pubkey.cc,
# not inside any container. Only the `server_tokens off;` line and the two
# `include` lines were added to the Certbot-generated original -- diff
# against your live file before copying over blindly, in case Certbot's
# renewal has touched anything else since.

server {
  server_name api.pubkey.cc;

  location / {
    proxy_pass         http://localhost:5173;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host $host;
  }


    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.pubkey.cc/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.pubkey.cc/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    server_tokens off;
    include snippets/security-headers-common.conf;
    include snippets/csp-api.conf;

}
server {
    if ($host = api.pubkey.cc) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


  server_name api.pubkey.cc;


    listen 80;
    return 404; # managed by Certbot


}
