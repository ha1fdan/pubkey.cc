# pubkey.cc serves a static SPA with no inline scripts/styles (verified
# against the built output), so this is a strict CSP with no
# 'unsafe-inline'/'unsafe-eval' anywhere. connect-src must list
# api.pubkey.cc explicitly (both https: for fetch and wss: for the
# WebSocket) since it's a different origin from the page itself.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.pubkey.cc wss://api.pubkey.cc; object-src 'none'; base-uri 'none'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;
